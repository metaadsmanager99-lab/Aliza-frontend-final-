<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aliza Quotex Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- 🔒 LOGIN & TICKER SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 class="login-title">ALIZA <span>SECURE</span></h2>
            <p style="color:var(--text-dim); margin-bottom: 20px; font-size:14px;">Authorized Access Only</p>
            
            <div id="login-form">
                <input type="email" id="email" placeholder="Enter Email" required>
                <input type="password" id="password" placeholder="Enter Password" required>
                <button class="btn-generate" id="btnLogin">Request Access</button>
            </div>
            
            <div id="waiting-msg" style="display: none;">
                <div class="radar" style="width: 40px; height: 40px; margin: 0 auto 10px;"></div>
                <p style="color: var(--neon-blue); font-weight: bold;">Waiting for Admin's Approval...</p>
                <p style="font-size: 12px; color: var(--text-dim);">Do not close this screen.</p>
            </div>
        </div>

        <!-- WINNERS TICKER SECTION -->
        <div class="ticker-container">
            <div class="ticker-title">🔥 LIVE PROFITS TODAY 🔥</div>
            <div class="ticker-wrap">
                <div class="ticker-move" id="tickerItems">
                    <!-- JS will inject winners here -->
                </div>
            </div>
        </div>
    </div>

    <!-- 🌟 SPLASH SCREEN -->
    <div id="splash-screen" style="display: none;">
        <div class="splash-logo">ALIZA <span>TRADER</span></div>
        <p class="splash-text">ACCESS GRANTED. INITIALIZING AI...</p>
    </div>

    <!-- 📱 MAIN APP UI -->
    <div id="main-app" style="display: none;">
        <header>
            <h1>Aliza <span>Bot</span></h1>
            <div class="badges">
                <div class="badge">MT4/MT5</div>
                <div class="badge premium">PREMIUM ACTIVE</div>
            </div>
        </header>

        <div class="control-panel">
            <div class="input-group">
                <label>Select Market Type</label>
                <select id="marketType"></select>
            </div>
            <div class="input-group">
                <label>Select Asset Pair</label>
                <select id="assetPair"></select>
            </div>
            <div class="input-group">
                <label>Timeframe</label>
                <select id="timeframe">
                    <option value="5s">5 Seconds</option>
                    <option value="15s">15 Seconds</option>
                    <option value="1m">1 Minute</option>
                </select>
            </div>
            <button class="btn-generate" id="btnGen">Analyze Market 🚀</button>
        </div>

        <div class="scanner-container" id="scanner">
            <div class="radar"></div>
            <p class="scan-text">AI Scanning Live Data...</p>
        </div>

        <div class="result-box" id="resultBox">
            <div id="signalOutput" class="signal-text"></div>
            <div class="accuracy" id="accuracyText"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
